<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sports Picks Contest</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a6b1a;--green-dk:#155515;--red:#c0392b;--red-lt:#fdecea;
  --blue:#1a5fb5;--blue-lt:#e8f0fb;--gold:#b8860b;--gold-lt:#fff8e1;
  --bg:#f4f5f7;--card:#fff;--border:#e0e0e0;--muted:#666;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 4px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#111;font-size:15px;line-height:1.5}
h1{font-size:20px;font-weight:600}
h2{font-size:17px;font-weight:600}
h3{font-size:15px;font-weight:600}
a{color:var(--blue);text-decoration:none}
button{cursor:pointer;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;padding:9px 16px;transition:filter .15s}
button:hover{filter:brightness(1.08)}
button:active{filter:brightness(.95);transform:scale(.98)}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--green);color:#fff}
.btn-secondary{background:#eee;color:#333}
.btn-danger{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:#fff;color:#111;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:4px}
.form-group{margin-bottom:14px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card+.card{margin-top:10px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#d4edda;color:#155724}
.badge-red{background:#f8d7da;color:#721c24}
.badge-blue{background:#d1ecf1;color:#0c5460}
.badge-gold{background:#fff3cd;color:#856404}
.badge-gray{background:#e9ecef;color:#495057}
.badge-orange{background:#ffe5d0;color:#7d3700}
.tag-live{background:var(--red);color:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.divider{height:1px;background:var(--border);margin:12px 0}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.text-muted{color:var(--muted);font-size:13px}
.text-sm{font-size:13px}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-gold{color:var(--gold)}
.text-center{text-align:center}
.mt4{margin-top:4px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.hidden{display:none!important}

/* ── Layout ───────────────────────────────────────────────────── */
#app{max-width:520px;margin:0 auto;padding:0 0 80px}
.topbar{background:var(--green);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.topbar h1{font-size:18px;color:#fff}
.topbar .sub{font-size:12px;opacity:.8;margin-top:2px}
.page{padding:12px 14px;display:none}
.page.active{display:block}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;background:none;border:none;color:var(--muted);font-size:10px;gap:3px;border-radius:0}
.nav-btn.active{color:var(--green)}
.nav-btn svg{width:22px;height:22px}
.nav-btn:hover{background:#f5f5f5}

/* ── Auth ─────────────────────────────────────────────────────── */
#auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-card{width:100%;max-width:400px;background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .icon{font-size:40px;display:block;margin-bottom:8px}
.auth-logo h1{font-size:22px;color:var(--green)}
.auth-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px}
.auth-tab{flex:1;padding:8px;text-align:center;background:none;border:none;font-size:14px;color:var(--muted);cursor:pointer}
.auth-tab.active{color:var(--green);border-bottom:2px solid var(--green);margin-bottom:-2px;font-weight:600}
.auth-error{background:#fdecea;color:var(--red);padding:10px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:none}

/* ── Games ────────────────────────────────────────────────────── */
.game-card{border-radius:var(--radius);border:1px solid var(--border);background:var(--card);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
.game-header{background:#f8f9fa;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.game-sport{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.game-time{font-size:12px;color:var(--muted)}
.game-body{padding:12px}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;text-align:center}
.team-name{font-size:14px;font-weight:600;line-height:1.2}
.team-score{font-size:22px;font-weight:700;color:#111}
.spread{font-size:12px;color:var(--muted);margin-top:2px}
.vs-box{font-size:12px;color:var(--muted);font-weight:600}
.game-footer{padding:10px 12px;background:#f8f9fa;border-top:1px solid var(--border)}
.pick-row{display:flex;gap:8px}
.pick-btn{flex:1;padding:8px;border-radius:var(--radius-sm);border:2px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:#333;text-align:center;transition:all .15s}
.pick-btn:hover{border-color:var(--blue);color:var(--blue)}
.pick-btn.selected-home{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.pick-btn.selected-away{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.pick-btn.won{background:#d4edda;border-color:var(--green);color:var(--green)}
.pick-btn.lost{background:#f8d7da;border-color:var(--red);color:var(--red)}
.pick-btn.push{background:#e9ecef;border-color:#aaa;color:#666}
.wager-row{display:flex;gap:6px;align-items:center;margin-top:8px}
.wager-input{flex:1;max-width:90px;padding:7px 10px;text-align:center}
.wager-presets{display:flex;gap:4px;flex-wrap:wrap}
.wager-preset{padding:5px 8px;font-size:12px;background:#eee;color:#333;border-radius:6px;border:1px solid var(--border)}
.my-pick-summary{background:var(--blue-lt);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;margin-top:6px}

/* ── Leaderboard ──────────────────────────────────────────────── */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank-1{background:var(--gold-lt);color:var(--gold)}
.rank-2{background:#f0f0f0;color:#666}
.rank-3{background:#fdecea;color:#b8600b}
.rank-n{background:#f4f5f7;color:#888}
.lb-name{flex:1;font-weight:500}
.lb-stats{text-align:right}
.lb-balance{font-size:15px;font-weight:700}
.lb-pending{font-size:11px;color:var(--muted)}

/* ── Admin ────────────────────────────────────────────────────── */
.admin-section{margin-bottom:16px}
.admin-section h3{margin-bottom:10px;color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.5px}
.contest-list-item{background:var(--card);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border);margin-bottom:8px}
.sport-chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;background:var(--green);color:#fff;font-weight:500}
.team-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.team-chip{padding:3px 9px;background:#e8f0fb;color:var(--blue);border-radius:20px;font-size:12px}
.game-admin-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px;margin-bottom:8px}
.score-input-row{display:flex;gap:6px;align-items:center;margin-top:8px}
.score-input{width:60px;text-align:center;padding:6px 8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle{width:44px;height:24px;border-radius:12px;background:#ccc;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:22px}

/* ── Tabs ─────────────────────────────────────────────────────── */
.tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px;gap:0;overflow-x:auto}
.tab{padding:8px 14px;background:none;border:none;font-size:14px;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}

/* ── Modals ───────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:22px;color:var(--muted);padding:0;line-height:1;margin-top:-2px}

/* ── Misc ─────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .icon{font-size:40px;display:block;margin-bottom:10px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #eee;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-bar{height:3px;background:linear-gradient(90deg,var(--green),#5cb85c);border-radius:2px;animation:loading 1.5s infinite}
@keyframes loading{0%{width:0%;margin-left:0}50%{width:60%}100%{width:100%;margin-left:100%}}
.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.info-box{background:var(--blue-lt);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:#0c5460;margin-bottom:12px}
.warn-box{background:#fff3cd;border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:#856404;margin-bottom:12px}
.config-note{font-size:12px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     CONFIG — Replace these with your actual values
══════════════════════════════════════════════════════════════════ -->
<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const ODDS_API_KEY = 'YOUR_ODDS_API_KEY'; // https://the-odds-api.com — free tier = 500 req/mo
// Set to true for the very first user to auto-become admin (then set manually in DB)
const AUTO_ADMIN_FIRST_USER = true;
</script>

<!-- ══════════════════════════════════════════════════════════════
     AUTH PAGE
══════════════════════════════════════════════════════════════════ -->
<div id="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">🏆</span>
      <h1>Sports Picks</h1>
      <p class="text-muted text-sm">Beat the spread with your friends</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">Create Account</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <!-- Login -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      </div>
      <button class="btn-primary btn-full" onclick="doLogin()">Sign In</button>
    </div>
    <!-- Signup -->
    <div id="signup-form" class="hidden">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="signup-name" placeholder="Your name (shown on leaderboard)">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <button class="btn-primary btn-full" onclick="doSignup()">Create Account</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════════════════════════════ -->
<div id="main-app" class="hidden">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="flex-between">
      <div>
        <h1 id="topbar-title">Sports Picks</h1>
        <div class="sub" id="topbar-sub"></div>
      </div>
      <div class="flex" style="gap:6px">
        <span id="topbar-balance" style="font-size:14px;font-weight:600;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px"></span>
        <button onclick="doLogout()" style="background:rgba(255,255,255,.2);color:#fff;padding:5px 10px;font-size:12px;border-radius:20px">Out</button>
      </div>
    </div>
  </div>
  <div id="loading-bar" class="loading-bar hidden" style="position:sticky;top:54px;z-index:40"></div>

  <!-- Pages -->
  <div id="app">
    <!-- PICKS PAGE -->
    <div id="page-picks" class="page active">
      <div class="tab-bar" id="contest-tabs"></div>
      <div id="picks-content"></div>
    </div>

    <!-- LEADERBOARD PAGE -->
    <div id="page-leaderboard" class="page">
      <div class="tab-bar" id="lb-contest-tabs"></div>
      <div id="leaderboard-content"></div>
    </div>

    <!-- MY PICKS PAGE -->
    <div id="page-mypicks" class="page">
      <div class="tab-bar" id="mp-contest-tabs"></div>
      <div id="mypicks-content"></div>
    </div>

    <!-- ADMIN PAGE -->
    <div id="page-admin" class="page">
      <div class="tab-bar">
        <button class="tab active" onclick="switchAdminTab('contests')">Contests</button>
        <button class="tab" onclick="switchAdminTab('games')">Games</button>
        <button class="tab" onclick="switchAdminTab('settle')">Settle</button>
        <button class="tab" onclick="switchAdminTab('players')">Players</button>
      </div>
      <div id="admin-contests-tab"></div>
      <div id="admin-games-tab" class="hidden"></div>
      <div id="admin-settle-tab" class="hidden"></div>
      <div id="admin-players-tab" class="hidden"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottomnav">
    <button class="nav-btn active" id="nav-picks" onclick="navTo('picks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      Games
    </button>
    <button class="nav-btn" id="nav-leaderboard" onclick="navTo('leaderboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Standings
    </button>
    <button class="nav-btn" id="nav-mypicks" onclick="navTo('mypicks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      My Picks
    </button>
    <button class="nav-btn hidden" id="nav-admin" onclick="navTo('admin')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M12 14c-5 0-8 2-8 3v1h16v-1c0-1-3-3-8-3z"/></svg>
      Admin
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     MODALS
══════════════════════════════════════════════════════════════════ -->

<!-- Create/Edit Contest Modal -->
<div id="modal-contest" class="modal-overlay hidden">
  <div class="modal">
    <div class="flex-between">
      <div class="modal-title" id="contest-modal-title">New Contest</div>
      <button class="modal-close" onclick="closeModal('modal-contest')">×</button>
    </div>
    <input type="hidden" id="contest-id-edit">
    <div class="form-group">
      <label>Contest Name</label>
      <input type="text" id="c-name" placeholder="e.g. NFL Week 14 Picks">
    </div>
    <div class="form-group">
      <label>Sport</label>
      <select id="c-sport">
        <option value="americanfootball_nfl">NFL Football</option>
        <option value="basketball_nba">NBA Basketball</option>
        <option value="baseball_mlb">MLB Baseball</option>
        <option value="icehockey_nhl">NHL Hockey</option>
        <option value="soccer_epl">EPL Soccer</option>
        <option value="americanfootball_ncaaf">NCAA Football</option>
        <option value="basketball_ncaab">NCAA Basketball</option>
      </select>
    </div>
    <div class="form-group">
      <label>Teams to include (comma-separated, leave blank for all)</label>
      <input type="text" id="c-teams" placeholder="e.g. Patriots, Bills, Jets, Dolphins">
      <div class="config-note">Only games where at least one team matches will be shown</div>
    </div>
    <div class="form-group">
      <label>Starting Token Balance</label>
      <input type="number" id="c-balance" value="1000" min="100">
    </div>
    <div class="form-group">
      <label>Max Bet Per Game</label>
      <input type="number" id="c-maxbet" value="200" min="10">
    </div>
    <div class="form-group">
      <label>Contest Start Date</label>
      <input type="date" id="c-start">
    </div>
    <div class="form-group">
      <label>Contest End Date</label>
      <input type="date" id="c-end">
    </div>
    <button class="btn-primary btn-full" onclick="saveContest()">Save Contest</button>
  </div>
</div>

<!-- Manual Spread Entry Modal -->
<div id="modal-spread" class="modal-overlay hidden">
  <div class="modal">
    <div class="flex-between">
      <div class="modal-title">Set Spread</div>
      <button class="modal-close" onclick="closeModal('modal-spread')">×</button>
    </div>
    <input type="hidden" id="spread-game-id">
    <div id="spread-game-info" class="info-box"></div>
    <div class="form-group">
      <label>Favorite Team</label>
      <select id="spread-fav-team"></select>
    </div>
    <div class="form-group">
      <label>Spread (points favorite gives)</label>
      <input type="number" id="spread-value" placeholder="e.g. 3.5" step="0.5" min="0.5">
      <div class="config-note">Enter a positive number — the favorite gives this many points</div>
    </div>
    <button class="btn-primary btn-full" onclick="saveSpread()">Save Spread</button>
  </div>
</div>

<!-- Player Picks Detail Modal -->
<div id="modal-picks-detail" class="modal-overlay hidden">
  <div class="modal">
    <div class="flex-between">
      <div class="modal-title" id="picks-detail-title">Player Picks</div>
      <button class="modal-close" onclick="closeModal('modal-picks-detail')">×</button>
    </div>
    <div id="picks-detail-content"></div>
  </div>
</div>

<!-- Place Bet Modal -->
<div id="modal-bet" class="modal-overlay hidden">
  <div class="modal">
    <div class="flex-between">
      <div class="modal-title">Place Pick</div>
      <button class="modal-close" onclick="closeModal('modal-bet')">×</button>
    </div>
    <div id="bet-game-info"></div>
    <div class="form-group mt12">
      <label>Your Pick</label>
      <div class="pick-row" id="bet-pick-btns" style="gap:8px"></div>
    </div>
    <div class="form-group">
      <label>Wager (tokens) — Max: <span id="bet-max"></span>, Available: <span id="bet-avail"></span></label>
      <div class="flex" style="gap:6px">
        <input type="number" id="bet-amount" placeholder="Amount" style="flex:1">
        <button class="btn-secondary btn-sm" onclick="setBetMax()">Max</button>
      </div>
      <div class="flex" style="gap:5px;margin-top:6px;flex-wrap:wrap" id="bet-presets"></div>
    </div>
    <div id="bet-existing-info" class="warn-box hidden"></div>
    <button class="btn-primary btn-full" onclick="submitBet()">Confirm Pick</button>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- ══════════════════════════════════════════════════════════════
     MAIN JAVASCRIPT
══════════════════════════════════════════════════════════════════ -->
<script>
// ── Supabase Init ──────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ──────────────────────────────────────────────────────
let currentUser = null;
let currentProfile = null;
let contests = [];
let activeContestId = null;
let activeLbContestId = null;
let activeMpContestId = null;
let currentAdminTab = 'contests';
let pendingBet = {}; // {gameId, contestId, pickedTeam, amount}

// ── Utilities ──────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function loading(on) {
  document.getElementById('loading-bar').classList.toggle('hidden', !on);
}
function fmtTokens(n) { return Number(n).toLocaleString(); }
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtSpread(spread, favTeam, homeTeam, awayTeam) {
  if (!spread || !favTeam) return 'No spread set';
  const isFavHome = favTeam === homeTeam;
  const h = isFavHome ? `-${spread}` : `+${spread}`;
  const a = isFavHome ? `+${spread}` : `-${spread}`;
  return `${homeTeam} ${h} / ${awayTeam} ${a}`;
}
function gameStatusBadge(status) {
  if (status === 'scheduled') return '<span class="badge badge-blue">Upcoming</span>';
  if (status === 'live') return '<span class="badge tag-live">LIVE</span>';
  if (status === 'final') return '<span class="badge badge-gray">Final</span>';
  return `<span class="badge badge-gray">${status}</span>`;
}
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

// ── Auth ───────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('auth-error').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  if (!email || !pass) { showAuthError('Please fill in all fields'); return; }
  loading(true);
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  loading(false);
  if (error) showAuthError(error.message);
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-password').value;
  if (!name || !email || !pass) { showAuthError('Please fill in all fields'); return; }
  if (pass.length < 6) { showAuthError('Password must be at least 6 characters'); return; }
  loading(true);
  const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { display_name: name } } });
  loading(false);
  if (error) { showAuthError(error.message); return; }
  // Create profile
  if (data.user) {
    await sb.from('profiles').upsert({ id: data.user.id, display_name: name, email, is_admin: false });
  }
  toast('Account created! Please check your email to confirm.');
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  currentProfile = null;
  document.getElementById('auth-page').style.display = 'flex';
  document.getElementById('main-app').classList.add('hidden');
}

// ── Session ────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    await loadProfile();
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('main-app').classList.remove('hidden');
    await initApp();
  } else {
    document.getElementById('auth-page').style.display = 'flex';
    document.getElementById('main-app').classList.add('hidden');
  }
});

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if (data) {
    currentProfile = data;
  } else {
    // Auto-create profile if missing
    const name = currentUser.user_metadata?.display_name || currentUser.email.split('@')[0];
    const { data: newP } = await sb.from('profiles').upsert({
      id: currentUser.id, display_name: name, email: currentUser.email, is_admin: false
    }).select().single();
    currentProfile = newP;
  }
}

// ── App Init ───────────────────────────────────────────────────
async function initApp() {
  // Show admin nav if admin
  if (currentProfile?.is_admin) {
    document.getElementById('nav-admin').classList.remove('hidden');
  }
  updateTopbar();
  await loadContests();
  renderPicksPage();
  renderLeaderboardPage();
  renderMyPicksPage();
  if (currentProfile?.is_admin) renderAdminPage();
  // Poll for updates every 2 minutes
  setInterval(async () => {
    await loadContests();
    await checkAndSettleGames();
  }, 120000);
}

function updateTopbar() {
  document.getElementById('topbar-title').textContent = 'Sports Picks';
  document.getElementById('topbar-sub').textContent = currentProfile?.display_name || '';
}

async function updateBalanceDisplay(contestId) {
  if (!contestId) return;
  const { data } = await sb.from('contest_players')
    .select('balance')
    .eq('contest_id', contestId)
    .eq('player_id', currentUser.id)
    .single();
  if (data) document.getElementById('topbar-balance').textContent = `🪙 ${fmtTokens(data.balance)}`;
}

// ── Load Data ──────────────────────────────────────────────────
async function loadContests() {
  const { data, error } = await sb.from('contests').select('*').order('created_at', { ascending: false });
  if (!error && data) contests = data;
}

async function getGamesForContest(contestId) {
  const { data } = await sb.from('games').select('*').eq('contest_id', contestId).order('game_time', { ascending: true });
  return data || [];
}

async function getPicksForUser(contestId, userId) {
  const { data } = await sb.from('picks').select('*').eq('contest_id', contestId).eq('player_id', userId);
  return data || [];
}

async function getAllPicksForContest(contestId) {
  const { data } = await sb.from('picks').select('*, profiles(display_name)').eq('contest_id', contestId);
  return data || [];
}

async function getLeaderboardForContest(contestId) {
  const { data } = await sb.from('contest_players')
    .select('*, profiles(display_name, email)')
    .eq('contest_id', contestId)
    .order('balance', { ascending: false });
  return data || [];
}

// ── Navigation ─────────────────────────────────────────────────
function navTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`nav-${page}`).classList.add('active');
  if (page === 'leaderboard') renderLeaderboardPage();
  if (page === 'mypicks') renderMyPicksPage();
  if (page === 'admin') renderAdminPage();
}

// ── PICKS PAGE ─────────────────────────────────────────────────
function renderPicksPage() {
  const active = contests.filter(c => c.status !== 'archived');
  const tabBar = document.getElementById('contest-tabs');
  if (!active.length) {
    tabBar.innerHTML = '';
    document.getElementById('picks-content').innerHTML = `<div class="empty-state"><span class="icon">🏈</span><p>No active contests yet.</p><p class="text-muted text-sm mt4">Ask your admin to create one!</p></div>`;
    return;
  }
  if (!activeContestId || !active.find(c => c.id === activeContestId)) activeContestId = active[0].id;
  tabBar.innerHTML = active.map(c =>
    `<button class="tab ${c.id === activeContestId ? 'active' : ''}" onclick="switchPicksContest('${c.id}')">${c.name}</button>`
  ).join('');
  loadAndRenderGames(activeContestId);
  updateBalanceDisplay(activeContestId);
}

async function switchPicksContest(contestId) {
  activeContestId = contestId;
  document.querySelectorAll('#contest-tabs .tab').forEach(t =>
    t.classList.toggle('active', t.textContent === contests.find(c => c.id === contestId)?.name)
  );
  await loadAndRenderGames(contestId);
  updateBalanceDisplay(contestId);
}

async function loadAndRenderGames(contestId) {
  loading(true);
  const [games, myPicks] = await Promise.all([
    getGamesForContest(contestId),
    getPicksForUser(contestId, currentUser.id)
  ]);
  loading(false);
  const contest = contests.find(c => c.id === contestId);
  renderGames(games, myPicks, contest);
  // Ensure user is enrolled
  ensureEnrolled(contestId, contest?.starting_balance || 1000);
}

async function ensureEnrolled(contestId, startingBalance) {
  const { data } = await sb.from('contest_players').select('id').eq('contest_id', contestId).eq('player_id', currentUser.id).single();
  if (!data) {
    await sb.from('contest_players').insert({ contest_id: contestId, player_id: currentUser.id, balance: startingBalance });
    updateBalanceDisplay(contestId);
  }
}

function renderGames(games, myPicks, contest) {
  const el = document.getElementById('picks-content');
  if (!games.length) {
    el.innerHTML = `<div class="empty-state"><span class="icon">📅</span><p>No games imported yet.</p></div>`;
    return;
  }
  const now = new Date();
  const pickMap = {};
  myPicks.forEach(p => pickMap[p.game_id] = p);
  const upcoming = games.filter(g => g.status === 'scheduled' && new Date(g.game_time) > now);
  const live = games.filter(g => g.status === 'live');
  const finished = games.filter(g => g.status === 'final');
  let html = '';
  if (live.length) {
    html += `<div class="section-title">🔴 Live Now</div>`;
    live.forEach(g => { html += renderGameCard(g, pickMap[g.id], contest, false); });
  }
  if (upcoming.length) {
    html += `<div class="section-title" style="margin-top:${live.length?'16px':'0'}">Upcoming — Place Your Picks</div>`;
    upcoming.forEach(g => { html += renderGameCard(g, pickMap[g.id], contest, true); });
  }
  if (finished.length) {
    html += `<div class="section-title" style="margin-top:16px">Completed</div>`;
    finished.forEach(g => { html += renderGameCard(g, pickMap[g.id], contest, false); });
  }
  el.innerHTML = html;
}

function renderGameCard(game, pick, contest, canBet) {
  const hasSpread = game.spread_value && game.spread_favorite;
  const homeSpread = hasSpread ? (game.spread_favorite === game.home_team ? `-${game.spread_value}` : `+${game.spread_value}`) : '';
  const awaySpread = hasSpread ? (game.spread_favorite === game.away_team ? `-${game.spread_value}` : `+${game.spread_value}`) : '';
  const isLive = game.status === 'live';
  const isFinal = game.status === 'final';
  let pickSummary = '';
  if (pick) {
    const outcomeClass = pick.outcome === 'won' ? 'text-green' : pick.outcome === 'lost' ? 'text-red' : pick.outcome === 'push' ? '' : 'text-muted';
    const outcomeText = pick.outcome === 'won' ? `✅ Won +${fmtTokens(pick.payout)}` : pick.outcome === 'lost' ? `❌ Lost -${fmtTokens(pick.wager)}` : pick.outcome === 'push' ? '🤝 Push' : `⏳ ${fmtTokens(pick.wager)} tokens wagered`;
    pickSummary = `<div class="my-pick-summary"><strong>Your pick:</strong> ${pick.picked_team} <span class="${outcomeClass}" style="float:right">${outcomeText}</span></div>`;
  }
  const footerContent = canBet && !pick
    ? `<button class="btn-primary btn-sm btn-full" onclick="openBetModal('${game.id}','${contest?.id}')">Make Pick</button>`
    : (canBet && pick ? pickSummary : pickSummary);
  return `
    <div class="game-card">
      <div class="game-header">
        <span class="game-sport">${game.sport || ''}</span>
        <div class="flex" style="gap:6px">
          ${gameStatusBadge(game.status)}
          <span class="game-time">${fmtDate(game.game_time)}</span>
        </div>
      </div>
      <div class="game-body">
        <div class="teams-row">
          <div>
            <div class="team-name">${game.away_team}</div>
            ${isFinal || isLive ? `<div class="team-score">${game.away_score ?? '-'}</div>` : ''}
            ${hasSpread ? `<div class="spread">${awaySpread}</div>` : ''}
          </div>
          <div class="vs-box">@</div>
          <div>
            <div class="team-name">${game.home_team}</div>
            ${isFinal || isLive ? `<div class="team-score">${game.home_score ?? '-'}</div>` : ''}
            ${hasSpread ? `<div class="spread">${homeSpread}</div>` : ''}
          </div>
        </div>
        ${!hasSpread && canBet ? `<div class="text-muted text-sm text-center mt8" style="font-style:italic">Spread not set yet</div>` : ''}
      </div>
      ${footerContent ? `<div class="game-footer">${footerContent}</div>` : ''}
    </div>`;
}

// ── BET MODAL ──────────────────────────────────────────────────
async function openBetModal(gameId, contestId) {
  const games = await getGamesForContest(contestId);
  const game = games.find(g => g.id === gameId);
  const contest = contests.find(c => c.id === contestId);
  if (!game) return;
  if (!game.spread_value) { toast('Spread not set for this game yet'); return; }
  const { data: cp } = await sb.from('contest_players').select('balance').eq('contest_id', contestId).eq('player_id', currentUser.id).single();
  const balance = cp?.balance || 0;
  const maxBet = Math.min(contest?.max_bet || 9999, balance);
  const homeSpread = game.spread_favorite === game.home_team ? `-${game.spread_value}` : `+${game.spread_value}`;
  const awaySpread = game.spread_favorite === game.away_team ? `-${game.spread_value}` : `+${game.spread_value}`;
  document.getElementById('bet-game-info').innerHTML = `
    <div class="card" style="margin-bottom:0;border-radius:var(--radius-sm)">
      <div class="teams-row">
        <div><div class="team-name">${game.away_team}</div><div class="spread">${awaySpread}</div></div>
        <div class="vs-box">@</div>
        <div><div class="team-name">${game.home_team}</div><div class="spread">${homeSpread}</div></div>
      </div>
    </div>`;
  document.getElementById('bet-max').textContent = fmtTokens(maxBet);
  document.getElementById('bet-avail').textContent = fmtTokens(balance);
  document.getElementById('bet-amount').value = '';
  document.getElementById('bet-amount').max = maxBet;
  document.getElementById('bet-existing-info').classList.add('hidden');
  // Check for existing pick
  const { data: existing } = await sb.from('picks').select('*').eq('game_id', gameId).eq('player_id', currentUser.id).single();
  if (existing) {
    document.getElementById('bet-existing-info').textContent = `You already picked ${existing.picked_team} for ${fmtTokens(existing.wager)} tokens. Submitting will replace your pick.`;
    document.getElementById('bet-existing-info').classList.remove('hidden');
  }
  // Pick buttons
  document.getElementById('bet-pick-btns').innerHTML = `
    <button class="pick-btn" id="pbtn-away" onclick="selectBetPick('${game.away_team}')">${game.away_team}<br><span class="spread" style="font-size:11px">${awaySpread}</span></button>
    <button class="pick-btn" id="pbtn-home" onclick="selectBetPick('${game.home_team}')">${game.home_team}<br><span class="spread" style="font-size:11px">${homeSpread}</span></button>`;
  // Presets
  const presets = [25, 50, 100, 200].filter(p => p <= maxBet);
  document.getElementById('bet-presets').innerHTML = presets.map(p =>
    `<button class="wager-preset" onclick="document.getElementById('bet-amount').value=${p}">${fmtTokens(p)}</button>`
  ).join('');
  pendingBet = { gameId, contestId, pickedTeam: null, maxBet };
  openModal('modal-bet');
}

function selectBetPick(team) {
  pendingBet.pickedTeam = team;
  document.querySelectorAll('.pick-btn').forEach(b => b.classList.remove('selected-home','selected-away'));
  document.querySelectorAll('.pick-btn').forEach(b => {
    if (b.textContent.includes(team)) b.classList.add('selected-home');
  });
}

function setBetMax() { document.getElementById('bet-amount').value = pendingBet.maxBet; }

async function submitBet() {
  if (!pendingBet.pickedTeam) { toast('Please select a team'); return; }
  const amount = parseInt(document.getElementById('bet-amount').value);
  if (!amount || amount < 1) { toast('Enter a valid wager amount'); return; }
  if (amount > pendingBet.maxBet) { toast(`Max bet is ${fmtTokens(pendingBet.maxBet)} tokens`); return; }
  loading(true);
  // Remove existing pick if any
  const { data: existing } = await sb.from('picks').select('*').eq('game_id', pendingBet.gameId).eq('player_id', currentUser.id).single();
  if (existing) {
    // Refund old wager
    await sb.rpc('increment_balance', { p_player_id: currentUser.id, p_contest_id: pendingBet.contestId, p_amount: existing.wager });
    await sb.from('picks').delete().eq('id', existing.id);
  }
  // Deduct balance
  const { error: deductErr } = await sb.rpc('increment_balance', { p_player_id: currentUser.id, p_contest_id: pendingBet.contestId, p_amount: -amount });
  if (deductErr) { toast('Error placing pick'); loading(false); return; }
  // Insert pick
  const { error: pickErr } = await sb.from('picks').insert({
    game_id: pendingBet.gameId, contest_id: pendingBet.contestId,
    player_id: currentUser.id, picked_team: pendingBet.pickedTeam,
    wager: amount, outcome: 'pending'
  });
  loading(false);
  if (pickErr) { toast('Error saving pick'); return; }
  toast('Pick placed! 🎉');
  closeModal('modal-bet');
  await loadAndRenderGames(pendingBet.contestId);
  updateBalanceDisplay(pendingBet.contestId);
}

// ── LEADERBOARD PAGE ───────────────────────────────────────────
async function renderLeaderboardPage() {
  const active = contests.filter(c => c.status !== 'archived');
  const tabBar = document.getElementById('lb-contest-tabs');
  if (!active.length) {
    tabBar.innerHTML = '';
    document.getElementById('leaderboard-content').innerHTML = `<div class="empty-state"><span class="icon">🏆</span><p>No contests yet.</p></div>`;
    return;
  }
  if (!activeLbContestId || !active.find(c => c.id === activeLbContestId)) activeLbContestId = active[0].id;
  tabBar.innerHTML = active.map(c =>
    `<button class="tab ${c.id === activeLbContestId ? 'active' : ''}" onclick="switchLbContest('${c.id}')">${c.name}</button>`
  ).join('');
  await loadAndRenderLeaderboard(activeLbContestId);
}

async function switchLbContest(contestId) {
  activeLbContestId = contestId;
  document.querySelectorAll('#lb-contest-tabs .tab').forEach(t =>
    t.classList.toggle('active', t.textContent === contests.find(c => c.id === contestId)?.name)
  );
  await loadAndRenderLeaderboard(contestId);
}

async function loadAndRenderLeaderboard(contestId) {
  loading(true);
  const [lb, allPicks, games] = await Promise.all([
    getLeaderboardForContest(contestId),
    getAllPicksForContest(contestId),
    getGamesForContest(contestId)
  ]);
  loading(false);
  const contest = contests.find(c => c.id === contestId);
  // Compute pending bets per player
  const pendingMap = {};
  allPicks.filter(p => p.outcome === 'pending').forEach(p => {
    pendingMap[p.player_id] = (pendingMap[p.player_id] || 0) + p.wager;
  });
  const pickCountMap = {};
  const winCountMap = {};
  allPicks.forEach(p => {
    pickCountMap[p.player_id] = (pickCountMap[p.player_id] || 0) + 1;
    if (p.outcome === 'won') winCountMap[p.player_id] = (winCountMap[p.player_id] || 0) + 1;
  });
  let html = '';
  if (!lb.length) { document.getElementById('leaderboard-content').innerHTML = `<div class="empty-state"><span class="icon">⏳</span><p>No players yet.</p></div>`; return; }
  html += `<div class="card">`;
  lb.forEach((row, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-n';
    const rankLabel = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const pending = pendingMap[row.player_id] || 0;
    const picks = pickCountMap[row.player_id] || 0;
    const wins = winCountMap[row.player_id] || 0;
    const isMe = row.player_id === currentUser.id;
    const net = row.balance - (contest?.starting_balance || 1000);
    const netStr = net >= 0 ? `+${fmtTokens(net)}` : fmtTokens(net);
    const netClass = net > 0 ? 'text-green' : net < 0 ? 'text-red' : '';
    html += `
      <div class="lb-row" style="${isMe ? 'background:#f0f7f0;border-radius:8px;padding:10px 6px;margin:0 -6px' : ''}">
        <div class="lb-rank ${rankClass}">${rankLabel}</div>
        <div style="flex:1">
          <div class="flex-between">
            <span style="font-weight:${isMe?700:500}">${row.profiles?.display_name || 'Unknown'}${isMe?' (you)':''}</span>
            <span class="lb-balance">🪙 ${fmtTokens(row.balance)}</span>
          </div>
          <div class="flex-between mt4">
            <span class="text-muted text-sm">${picks} picks · ${wins} wins${pending > 0 ? ` · <span style="color:var(--gold)">🎲 ${fmtTokens(pending)} pending</span>` : ''}</span>
            <span class="text-sm ${netClass}">${netStr}</span>
          </div>
        </div>
        <button class="btn-secondary btn-sm" onclick="showPlayerPicks('${row.player_id}','${row.profiles?.display_name}','${contestId}')">Picks</button>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('leaderboard-content').innerHTML = html;
}

// ── MY PICKS PAGE ──────────────────────────────────────────────
async function renderMyPicksPage() {
  const active = contests.filter(c => c.status !== 'archived');
  const tabBar = document.getElementById('mp-contest-tabs');
  if (!active.length) {
    tabBar.innerHTML = '';
    document.getElementById('mypicks-content').innerHTML = `<div class="empty-state"><span class="icon">📋</span><p>No contests yet.</p></div>`;
    return;
  }
  if (!activeMpContestId || !active.find(c => c.id === activeMpContestId)) activeMpContestId = active[0].id;
  tabBar.innerHTML = active.map(c =>
    `<button class="tab ${c.id === activeMpContestId ? 'active' : ''}" onclick="switchMpContest('${c.id}')">${c.name}</button>`
  ).join('');
  await loadAndRenderMyPicks(activeMpContestId);
}

async function switchMpContest(contestId) {
  activeMpContestId = contestId;
  document.querySelectorAll('#mp-contest-tabs .tab').forEach(t =>
    t.classList.toggle('active', t.textContent === contests.find(c => c.id === contestId)?.name)
  );
  await loadAndRenderMyPicks(contestId);
}

async function loadAndRenderMyPicks(contestId) {
  loading(true);
  const [picks, games] = await Promise.all([
    getPicksForUser(contestId, currentUser.id),
    getGamesForContest(contestId)
  ]);
  loading(false);
  const gameMap = {};
  games.forEach(g => gameMap[g.id] = g);
  if (!picks.length) {
    document.getElementById('mypicks-content').innerHTML = `<div class="empty-state"><span class="icon">🎯</span><p>No picks yet.</p><p class="text-muted text-sm mt4">Head to Games to place your picks!</p></div>`;
    return;
  }
  const sorted = [...picks].sort((a,b) => {
    const ga = gameMap[a.game_id], gb = gameMap[b.game_id];
    return new Date(ga?.game_time||0) - new Date(gb?.game_time||0);
  });
  let wins=0, losses=0, pending=0, pendingAmount=0, totalWon=0, totalLost=0;
  picks.forEach(p => {
    if (p.outcome==='won') { wins++; totalWon+=p.payout||0; }
    else if (p.outcome==='lost') { losses++; totalLost+=p.wager; }
    else if (p.outcome==='pending') { pending++; pendingAmount+=p.wager; }
  });
  let html = `
    <div class="card" style="margin-bottom:12px">
      <div class="grid2" style="gap:8px">
        <div style="text-align:center"><div class="text-muted text-sm">Wins</div><div style="font-size:20px;font-weight:700;color:var(--green)">${wins}</div></div>
        <div style="text-align:center"><div class="text-muted text-sm">Losses</div><div style="font-size:20px;font-weight:700;color:var(--red)">${losses}</div></div>
        <div style="text-align:center"><div class="text-muted text-sm">Net Tokens</div><div style="font-size:18px;font-weight:700;color:${totalWon-totalLost>=0?'var(--green)':'var(--red)'}">${totalWon-totalLost>=0?'+':''}${fmtTokens(totalWon-totalLost)}</div></div>
        <div style="text-align:center"><div class="text-muted text-sm">Pending</div><div style="font-size:18px;font-weight:700;color:var(--gold)">${pending > 0 ? `🎲 ${fmtTokens(pendingAmount)}` : '—'}</div></div>
      </div>
    </div>`;
  sorted.forEach(pick => {
    const game = gameMap[pick.game_id];
    if (!game) return;
    const isWon = pick.outcome === 'won';
    const isLost = pick.outcome === 'lost';
    const isPush = pick.outcome === 'push';
    const badge = isWon ? `<span class="badge badge-green">Won +${fmtTokens(pick.payout)}</span>` :
                  isLost ? `<span class="badge badge-red">Lost -${fmtTokens(pick.wager)}</span>` :
                  isPush ? `<span class="badge badge-gray">Push</span>` :
                  `<span class="badge badge-gold">Pending 🎲 ${fmtTokens(pick.wager)}</span>`;
    const homeSpread = game.spread_favorite === game.home_team ? `-${game.spread_value}` : `+${game.spread_value||'?'}`;
    const awaySpread = game.spread_favorite === game.away_team ? `-${game.spread_value}` : `+${game.spread_value||'?'}`;
    html += `
      <div class="game-card">
        <div class="game-header">
          <span class="game-time">${fmtDate(game.game_time)}</span>
          <div class="flex" style="gap:5px">${gameStatusBadge(game.status)}${badge}</div>
        </div>
        <div class="game-body">
          <div class="teams-row">
            <div>
              <div class="team-name ${pick.picked_team===game.away_team?'text-blue':''}">${game.away_team}${pick.picked_team===game.away_team?' ✓':''}</div>
              ${game.status!=='scheduled'?`<div class="team-score">${game.away_score??'-'}</div>`:''}
              <div class="spread">${awaySpread}</div>
            </div>
            <div class="vs-box">@</div>
            <div>
              <div class="team-name ${pick.picked_team===game.home_team?'text-blue':''}">${game.home_team}${pick.picked_team===game.home_team?' ✓':''}</div>
              ${game.status!=='scheduled'?`<div class="team-score">${game.home_score??'-'}</div>`:''}
              <div class="spread">${homeSpread}</div>
            </div>
          </div>
        </div>
      </div>`;
  });
  document.getElementById('mypicks-content').innerHTML = html;
}

                  pick.outcome === 'lost' ? `<span class="badge badge-red">Lost</span>` :
                  pick.outcome === 'push' ? `<span class="badge badge-gray">Push</span>` :
                  `<span class="badge badge-gold">Pending</span>`;

      <div style="padding:10px 0;border-bottom:1px solid var(--border)">

// Admin — Import Games
async function importGames(contestId) {
  const contest = contests.find(c => c.id === contestId);
  if (!contest) return;
  loading(true);
  toast('Fetching games…');
  try {
    // Try The Odds API for spreads first
    let oddsGames = [];
    if (ODDS_API_KEY && ODDS_API_KEY !== 'YOUR_ODDS_API_KEY') {
      try {
        const oddsResp = await fetch(`https://api.the-odds-api.com/v4/sports/${contest.sport_key}/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=spreads&oddsFormat=american`);
        if (oddsResp.ok) oddsGames = await oddsResp.json();
      } catch(e) { console.warn('Odds API unavailable', e); }
    }
    // TheSportsDB for game schedule
    const sportMap = {
      'americanfootball_nfl': '4391', 'basketball_nba': '4387',
      'baseball_mlb': '4424', 'icehockey_nhl': '4380',
      'soccer_epl': '4328', 'americanfootball_ncaaf': '4479',
      'basketball_ncaab': '4479'
    };
    const leagueId = sportMap[contest.sport_key] || '4387';
    const schedResp = await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=${leagueId}`);
    const schedData = await schedResp.json();
    const events = schedData?.events || [];
    let imported = 0;
    for (const ev of events) {
      const home = ev.strHomeTeam, away = ev.strAwayTeam;
      const gameTime = ev.dateEvent + 'T' + (ev.strTime || '00:00:00');
      // Filter by teams if set
      if (contest.teams_filter) {
        const filters = contest.teams_filter.split(',').map(t => t.trim().toLowerCase());
        const matchesHome = filters.some(f => home.toLowerCase().includes(f));
        const matchesAway = filters.some(f => away.toLowerCase().includes(f));
        if (!matchesHome && !matchesAway) continue;
      }
      // Check if already exists
      const { data: existing } = await sb.from('games').select('id').eq('external_id', ev.idEvent).eq('contest_id', contestId).single();
      if (existing) continue;
      // Match odds from The Odds API
      let spreadVal = null, spreadFav = null;
      const oddsMatch = oddsGames.find(og =>
        (og.home_team?.toLowerCase().includes(home.toLowerCase().split(' ').pop()) ||
         og.away_team?.toLowerCase().includes(away.toLowerCase().split(' ').pop()))
      );
      if (oddsMatch) {
        const mkt = oddsMatch.bookmakers?.[0]?.markets?.find(m => m.key === 'spreads');
        if (mkt) {
          const homeOut = mkt.outcomes?.find(o => o.name === oddsMatch.home_team);
          if (homeOut) {
            const point = Math.abs(homeOut.point);
            spreadVal = point;
            spreadFav = homeOut.point < 0 ? home : away;
          }
        }
      }
      await sb.from('games').insert({
        contest_id: contestId,
        external_id: ev.idEvent,
        home_team: home,
        away_team: away,
        game_time: gameTime,
        sport: contest.sport_key.split('_')[1]?.toUpperCase(),
        status: 'scheduled',
        spread_value: spreadVal,
        spread_favorite: spreadFav,
        home_score: null,
        away_score: null
      });
      imported++;
    }
    toast(`Imported ${imported} new games`);
  } catch (e) {
    console.error(e);
    toast('Error importing games. Check console.');
  }
  loading(false);
  renderAdminGames();
}

async function updateGameScore(gameId, contestId, newStatus) {
  const away = parseInt(document.getElementById(`score-away-${gameId}`)?.value);
  const home = parseInt(document.getElementById(`score-home-${gameId}`)?.value);
  if (newStatus === 'final' && (isNaN(away) || isNaN(home))) { toast('Enter both scores before settling'); return; }
  loading(true);
  await sb.from('games').update({ away_score: away||null, home_score: home||null, status: newStatus }).eq('id', gameId);
  if (newStatus === 'final' && !isNaN(away) && !isNaN(home)) {
    await settleGamePicks(gameId, contestId, away, home);
  }
  loading(false);
  toast(newStatus === 'final' ? 'Game settled and picks paid out!' : 'Score updated');
  renderAdminSettle();
  loadAndRenderGames(contestId);
}

async function fetchLatestScore(gameId, externalId, contestId) {
  if (!externalId) { toast('No external ID for this game'); return; }
  loading(true);
  try {
    const resp = await fetch(`https://www.thesportsdb.com/api/v1/json/3/lookupevent.php?id=${externalId}`);
    const data = await resp.json();
    const ev = data?.events?.[0];
    if (ev) {
      const homeScore = parseInt(ev.intHomeScore);
      const awayScore = parseInt(ev.intAwayScore);
      if (!isNaN(homeScore)) document.getElementById(`score-home-${gameId}`).value = homeScore;
      if (!isNaN(awayScore)) document.getElementById(`score-away-${gameId}`).value = awayScore;
      toast('Scores fetched!');
    } else { toast('No score data yet'); }
  } catch(e) { toast('Fetch error'); }
  loading(false);
}

async function settleGamePicks(gameId, contestId, awayScore, homeScore) {
  const { data: game } = await sb.from('games').select('*').eq('id', gameId).single();
  const { data: picks } = await sb.from('picks').select('*').eq('game_id', gameId).eq('outcome', 'pending');
  if (!picks?.length || !game) return;
  for (const pick of picks) {
    // Adjust scores by spread
    let adjHome = homeScore, adjAway = awayScore;
    if (game.spread_value && game.spread_favorite) {
      if (game.spread_favorite === game.home_team) adjHome -= game.spread_value;
      else adjAway -= game.spread_value;
    }
    let outcome, payout = 0;
    if (Math.abs(adjHome - adjAway) < 0.001) {
      outcome = 'push';
      payout = pick.wager; // Refund
    } else {
      const pickedHome = pick.picked_team === game.home_team;
      const homeWon = adjHome > adjAway;
      if ((pickedHome && homeWon) || (!pickedHome && !homeWon)) {
        outcome = 'won';
        payout = pick.wager * 2; // 1:1 even money payout (wager returned + winnings)
      } else {
        outcome = 'lost';
        payout = 0;
      }
    }
    await sb.from('picks').update({ outcome, payout }).eq('id', pick.id);
    if (payout > 0) {
      await sb.rpc('increment_balance', { p_player_id: pick.player_id, p_contest_id: contestId, p_amount: payout });
    }
  }
}

async function checkAndSettleGames() {
  // Auto-check for games that may have finished based on scheduled time
  for (const contest of contests) {
    const games = await getGamesForContest(contest.id);
    for (const game of games.filter(g => g.status === 'live' || (g.status === 'scheduled' && new Date(g.game_time) < new Date(Date.now() - 4*3600000)))) {
      // Fetch score from TheSportsDB
      if (game.external_id) {
        try {
          const resp = await fetch(`https://www.thesportsdb.com/api/v1/json/3/lookupevent.php?id=${game.external_id}`);
          const data = await resp.json();
          const ev = data?.events?.[0];
          if (ev?.strStatus === 'Match Finished' || ev?.intHomeScore !== null) {
            const homeScore = parseInt(ev.intHomeScore);
            const awayScore = parseInt(ev.intAwayScore);
            if (!isNaN(homeScore) && !isNaN(awayScore)) {
              await sb.from('games').update({ home_score: homeScore, away_score: awayScore, status: 'final' }).eq('id', game.id);
              await settleGamePicks(game.id, contest.id, awayScore, homeScore);
            }
          }
        } catch(e) {}
      }
    }
  }
}

// Admin — Players
async function renderAdminPlayers() {
  const el = document.getElementById('admin-players-tab');
  let html = `<div class="admin-section"><div class="section-title">All Players</div>`;
  const { data: profiles } = await sb.from('profiles').select('*').order('display_name');
  if (!profiles?.length) { el.innerHTML = `<div class="empty-state" style="padding:20px"><p>No players yet.</p></div>`; return; }
  profiles.forEach(p => {
    html += `
      <div class="toggle-row">
        <div>
          <div style="font-weight:500">${p.display_name}</div>
          <div class="text-muted text-sm">${p.email}</div>
        </div>
        <div class="flex" style="gap:8px">
          <span class="badge ${p.is_admin?'badge-gold':'badge-gray'}">${p.is_admin?'Admin':'Player'}</span>
          <button class="btn-secondary btn-sm" onclick="toggleAdmin('${p.id}',${p.is_admin})">${p.is_admin?'Remove Admin':'Make Admin'}</button>
        </div>
      </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

async function toggleAdmin(userId, isAdmin) {
  await sb.from('profiles').update({ is_admin: !isAdmin }).eq('id', userId);
  toast(isAdmin ? 'Admin removed' : 'Admin granted');
  renderAdminPlayers();
}

-- PROFILES
create table profiles (
  id uuid references auth.users primary key,
  display_name text not null,
  email text,
  is_admin boolean default false,
  created_at timestamptz default now()
);
alter table profiles enable row level security;
create policy "Users can read all profiles" on profiles for select using (true);
create policy "Users can update own profile" on profiles for update using (auth.uid() = id);
create policy "Users can insert own profile" on profiles for insert with check (auth.uid() = id);

-- CONTESTS
create table contests (
  id uuid primary key default gen_random_uuid(),
  name text not null,
  sport_key text not null,
  teams_filter text,
  starting_balance integer default 1000,
  max_bet integer default 200,
  status text default 'active',
  start_date date,
  end_date date,
  created_at timestamptz default now()
);
alter table contests enable row level security;
create policy "Anyone can read contests" on contests for select using (true);
create policy "Admins can manage contests" on contests for all using (
  exists (select 1 from profiles where id = auth.uid() and is_admin = true)
);

-- GAMES
create table games (
  id uuid primary key default gen_random_uuid(),
  contest_id uuid references contests(id) on delete cascade,
  external_id text,
  home_team text not null,
  away_team text not null,
  game_time timestamptz not null,
  sport text,
  status text default 'scheduled',
  spread_value numeric,
  spread_favorite text,
  home_score integer,
  away_score integer,
  created_at timestamptz default now()
);
alter table games enable row level security;
create policy "Anyone can read games" on games for select using (true);
create policy "Admins can manage games" on games for all using (
  exists (select 1 from profiles where id = auth.uid() and is_admin = true)
);

-- CONTEST PLAYERS
create table contest_players (
  id uuid primary key default gen_random_uuid(),
  contest_id uuid references contests(id) on delete cascade,
  player_id uuid references profiles(id) on delete cascade,
  balance integer not null default 1000,
  created_at timestamptz default now(),
  unique(contest_id, player_id)
);
alter table contest_players enable row level security;
create policy "Anyone can read standings" on contest_players for select using (true);
create policy "Users can insert own record" on contest_players for insert with check (auth.uid() = player_id);
create policy "System can update balances" on contest_players for update using (true);

-- PICKS
create table picks (
  id uuid primary key default gen_random_uuid(),
  game_id uuid references games(id) on delete cascade,
  contest_id uuid references contests(id) on delete cascade,
  player_id uuid references profiles(id) on delete cascade,
  picked_team text not null,
  wager integer not null,
  outcome text default 'pending',
  payout integer default 0,
  created_at timestamptz default now(),
  unique(game_id, player_id)
);
alter table picks enable row level security;
create policy "Users can read own picks and final/live game picks" on picks for select using (
  auth.uid() = player_id or
  exists (select 1 from games where id = picks.game_id and status in ('live','final'))
);
create policy "Users can insert own picks" on picks for insert with check (auth.uid() = player_id);
create policy "Users can update own pending picks" on picks for update using (auth.uid() = player_id);
create policy "Admins can update any pick" on picks for update using (
  exists (select 1 from profiles where id = auth.uid() and is_admin = true)
);

-- BALANCE RPC FUNCTION
create or replace function increment_balance(p_player_id uuid, p_contest_id uuid, p_amount integer)
returns void language plpgsql security definer as $$
begin
  update contest_players
  set balance = balance + p_amount
  where player_id = p_player_id and contest_id = p_contest_id;
end;
$$;
