<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pickleball Ladder League</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--surface3:#2a2f47;
  --accent:#f5c842;--accent2:#ff6b35;
  --text:#f0f0f8;--text2:#9098b4;--text3:#5a6180;
  --success:#36d399;--danger:#ff4d6d;--info:#60a5fa;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --radius:12px;--radius-sm:8px;
  --font:'DM Sans',sans-serif;--font-display:'Archivo Black',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
button,input,select{font-family:var(--font)}
button{cursor:pointer}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-family:var(--font-display);font-size:18px;color:var(--accent)}
.nav-logo span{color:var(--accent2)}
.nav-user{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px}
.nav-badge{background:var(--accent);color:#000;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.tabs{background:var(--surface);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;color:var(--text3);font-size:10px;transition:color .15s}
.tab.active{color:var(--accent)}
.tab-icon{font-size:20px;line-height:1}
.content{flex:1;padding:16px;padding-bottom:80px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-family:var(--font-display);font-size:13px;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;transition:all .15s;line-height:1}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#ffd700}
.btn-secondary{background:var(--surface3);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#000}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.field{margin-bottom:14px}
.label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border .15s}
.input:focus{border-color:var(--accent)}
select.input{appearance:none;cursor:pointer}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-display);font-size:20px;color:var(--text)}
.player-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.player-row:last-child{border-bottom:none}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:13px;color:var(--accent);flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-sub{font-size:12px;color:var(--text2);margin-top:2px}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pill-green{background:rgba(54,211,153,.15);color:var(--success)}
.pill-red{background:rgba(255,77,109,.15);color:var(--danger)}
.pill-amber{background:rgba(245,200,66,.15);color:var(--accent)}
.pill-blue{background:rgba(96,165,250,.15);color:var(--info)}
.pill-orange{background:rgba(255,107,53,.15);color:var(--accent2)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-val{font-family:var(--font-display);font-size:22px;color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.pts-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:8px}
.pts-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.toggle-wrap{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;gap:2px;margin-bottom:16px}
.toggle-opt{flex:1;text-align:center;padding:7px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none}
.toggle-opt.active{background:var(--accent);color:#000}
.match-card{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px}
.match-team-left{font-size:13px;font-weight:500}
.match-team-right{font-size:13px;font-weight:500;text-align:right}
.match-vs{font-family:var(--font-display);font-size:12px;color:var(--accent2);text-align:center}
.match-score{font-family:var(--font-display);font-size:20px;color:var(--accent);text-align:center}
.challenge-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:10px;border-left:3px solid var(--accent2)}
.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px}
.alert-danger{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.3);color:#ff8fa3}
.alert-success{background:rgba(54,211,153,.12);border:1px solid rgba(54,211,153,.3);color:var(--success)}
.alert-info{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.3);color:var(--info)}
.config-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}
.config-label{flex:1;font-size:13px}
.config-input{width:64px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--accent);font-family:var(--font-display);font-size:16px;text-align:center;outline:none}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-logo{font-family:var(--font-display);font-size:40px;color:var(--accent);margin-bottom:6px}
.login-sub{color:var(--text2);font-size:14px;margin-bottom:32px;text-align:center}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:380px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
.history-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-row:last-child{border-bottom:none}
.lb-rank{font-family:var(--font-display);font-size:18px;min-width:32px}
.rank-1{color:#ffd700}.rank-2{color:#c0c0c0}.rank-3{color:#cd7f32}.rank-other{color:var(--text3)}
.divider{height:1px;background:var(--border);margin:16px 0}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.flex{display:flex}.items-center{align-items:center}
.gap-8{gap:8px}.gap-12{gap:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.text-sm{font-size:13px}.text-xs{font-size:11px}
.text-muted{color:var(--text2)}.text-accent{color:var(--accent)}
.bold{font-weight:600}.center{text-align:center}.right{text-align:right}
.hidden{display:none!important}
/* Spinner */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-screen .spinner{width:36px;height:36px;border-width:3px}
/* Config banner */
.config-banner{background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.35);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.config-banner h2{font-family:var(--font-display);font-size:15px;color:var(--accent2);margin-bottom:8px}
.config-banner p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.config-banner code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--accent);font-family:monospace}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="color:var(--text2);font-size:14px">Loading…</div>
  </div>
</div>

<script>
// =====================================================================
// CONFIGURATION — paste your Supabase values here
// =====================================================================
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

// =====================================================================
// INIT
// =====================================================================
const { createClient } = supabase;
let db = null;

function isConfigured() {
  return SUPABASE_URL !== "YOUR_SUPABASE_URL" && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
}

// =====================================================================
// STATE
// =====================================================================
let S = {
  currentUser: null,
  players: [],
  sessions: [],
  matches: [],
  challenges: [],
  config: {},
  tab: "leaderboard",
  sessionView: null,
  profilePlayer: null,
  challengeSub: "open",
  settingsSub: "points",
  loading: false,
  error: null,
};

function set(patch) { Object.assign(S, patch); render(); }

// =====================================================================
// SUPABASE API LAYER
// =====================================================================
async function loadAll() {
  const [players, sessions, attendees, matches, challenges, responses, config] = await Promise.all([
    db.from("players").select("*").order("joined_at"),
    db.from("sessions").select("*").order("date", {ascending:false}),
    db.from("session_attendees").select("*"),
    db.from("matches").select("*").order("date"),
    db.from("challenges").select("*").order("created_at", {ascending:false}),
    db.from("challenge_responses").select("*"),
    db.from("point_config").select("*"),
  ]);

  // Attach attendees to sessions
  const sessionsWithAtt = (sessions.data||[]).map(s => ({
    ...s,
    attendees: (attendees.data||[]).filter(a=>a.session_id===s.id).map(a=>a.player_id)
  }));

  // Attach responses to challenges
  const challengesWithResp = (challenges.data||[]).map(c => ({
    ...c,
    responses: Object.fromEntries(
      (responses.data||[]).filter(r=>r.challenge_id===c.id).map(r=>[r.player_id, r.response])
    )
  }));

  // Config as object
  const configObj = {};
  (config.data||[]).forEach(row => { configObj[row.key] = {label:row.label, value:row.value}; });

  set({
    players: players.data||[],
    sessions: sessionsWithAtt,
    matches: matches.data||[],
    challenges: challengesWithResp,
    config: configObj,
    loading: false,
  });
}

async function apiToggleAttendance(sessionId, playerId) {
  const session = S.sessions.find(s=>s.id===sessionId);
  const has = session.attendees.includes(playerId);
  if(has) {
    await db.from("session_attendees").delete().eq("session_id",sessionId).eq("player_id",playerId);
  } else {
    await db.from("session_attendees").insert({session_id:sessionId,player_id:playerId});
  }
  await loadAll();
}

async function apiAddSession(date, label) {
  await db.from("sessions").insert({date, label, status:"upcoming"});
  await loadAll();
}

async function apiGenerateMatches(session) {
  // Delete existing matches for this session
  await db.from("matches").delete().eq("session_id", session.id);
  // Shuffle attendees
  const att = [...session.attendees];
  for(let i=att.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[att[i],att[j]]=[att[j],att[i]]; }
  const newMatches = [];
  for(let i=0;i+3<att.length;i+=4){
    newMatches.push({session_id:session.id, team1_p1:att[i], team1_p2:att[i+1], team2_p1:att[i+2], team2_p2:att[i+3], type:"random", date:session.date});
  }
  if(newMatches.length) await db.from("matches").insert(newMatches);
  await db.from("sessions").update({status:"active"}).eq("id", session.id);
  await loadAll();
}

async function apiSaveScore(matchId, score1, score2) {
  const winner = score1>score2?"team1":score2>score1?"team2":"draw";
  await db.from("matches").update({score1,score2,winner}).eq("id",matchId);
  await loadAll();
}

async function apiCompleteSession(sessionId) {
  await db.from("sessions").update({status:"completed"}).eq("id",sessionId);
  await loadAll();
}

async function apiIssueChallenge(partnerId, opp1Id, opp2Id) {
  const {data:challenge} = await db.from("challenges").insert({
    issuer_id:S.currentUser.id, partner_id:partnerId, opponent1_id:opp1Id, opponent2_id:opp2Id, status:"pending"
  }).select().single();
  await db.from("challenge_responses").insert([
    {challenge_id:challenge.id, player_id:partnerId, response:"pending"},
    {challenge_id:challenge.id, player_id:opp1Id,    response:"pending"},
    {challenge_id:challenge.id, player_id:opp2Id,    response:"pending"},
  ]);
  await loadAll();
}

async function apiRespondChallenge(challengeId, response) {
  await db.from("challenge_responses")
    .update({response})
    .eq("challenge_id", challengeId)
    .eq("player_id", S.currentUser.id);
  // Check if we should update status
  const {data:rows} = await db.from("challenge_responses").select("response").eq("challenge_id", challengeId);
  const all = rows||[];
  const allAcc = all.every(r=>r.response==="accepted");
  const anyDec = all.some(r=>r.response==="declined");
  if(allAcc) await db.from("challenges").update({status:"scheduled"}).eq("id",challengeId);
  else if(anyDec) await db.from("challenges").update({status:"declined"}).eq("id",challengeId);
  await loadAll();
}

async function apiUpdateConfig(key, value) {
  await db.from("point_config").update({value}).eq("key",key);
  await loadAll();
}

async function apiAddPlayer(name, email, password, isAdmin) {
  const {error} = await db.from("players").insert({name,email,password,is_admin:isAdmin});
  if(error) throw error;
  await loadAll();
}

async function apiRemovePlayer(id) {
  await db.from("players").delete().eq("id",id);
  await loadAll();
}

// =====================================================================
// HELPERS
// =====================================================================
function initials(name){ return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }
function getPlayer(id){ return S.players.find(p=>p.id===id); }
function firstName(id){ const p=getPlayer(id); return p?p.name.split(" ")[0]:"?"; }

function computeLeaderboard() {
  const stats = {};
  S.players.forEach(p => {
    stats[p.id]={playerId:p.id,points:0,attended:0,gamesPlayed:0,wins:0,losses:0,beatHigher:0,beatSimilar:0,beatLower:0};
  });
  const cfg = S.config;
  if(!cfg.attendance) return Object.values(stats);

  S.sessions.filter(s=>s.status==="completed").forEach(s=>{
    s.attendees.forEach(pid=>{ if(stats[pid]){ stats[pid].attended++; stats[pid].points+=cfg.attendance.value; } });
  });

  const sorted = Object.values(stats).sort((a,b)=>b.points-a.points);
  const rankMap = {};
  sorted.forEach((s,i)=>{ rankMap[s.playerId]=i+1; });

  S.matches.forEach(m=>{
    const team1=[m.team1_p1,m.team1_p2], team2=[m.team2_p1,m.team2_p2];
    [...team1,...team2].forEach(pid=>{ if(stats[pid]){ stats[pid].gamesPlayed++; stats[pid].points+=cfg.playGame.value; } });
    if(!m.winner||m.winner==="draw") return;
    const winners=m.winner==="team1"?team1:team2;
    const losers =m.winner==="team1"?team2:team1;
    const avg=team=>team.reduce((s,pid)=>s+(rankMap[pid]||5),0)/team.length;
    const wAvg=avg(winners), lAvg=avg(losers);
    winners.forEach(pid=>{
      if(!stats[pid]) return;
      stats[pid].wins++;
      const diff=wAvg-lAvg;
      if(diff>=2){stats[pid].beatHigher++;stats[pid].points+=cfg.beatHigher.value;}
      else if(diff>=0){stats[pid].beatSimilar++;stats[pid].points+=cfg.beatSimilar.value;}
      else{stats[pid].beatLower++;stats[pid].points+=cfg.beatLower.value;}
    });
    losers.forEach(pid=>{ if(stats[pid]) stats[pid].losses++; });
  });
  return Object.values(stats).sort((a,b)=>b.points-a.points||b.wins-a.wins);
}

// =====================================================================
// RENDER
// =====================================================================
function render() {
  const root = document.getElementById("app");
  if(!isConfigured()){ root.innerHTML = renderConfigBanner(); return; }
  if(S.loading){ root.innerHTML = `<div class="loading-screen"><div class="spinner"></div><div style="color:var(--text2);font-size:14px">Connecting…</div></div>`; return; }
  if(!S.currentUser){ root.innerHTML = renderLogin(); bindLogin(); return; }
  const lb = computeLeaderboard();
  const pendingNotifs = S.challenges.filter(c=>
    c.status==="pending" && c.responses[S.currentUser.id]==="pending" && c.issuer_id!==S.currentUser.id
  ).length;
  const tabLabel = pendingNotifs>0?`Challenges (${pendingNotifs})`:"Challenges";
  root.innerHTML = `
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-logo">PICKLE<span>BALL</span></div>
      <div class="nav-user">
        <span>${S.currentUser.name.split(" ")[0]}</span>
        ${S.currentUser.is_admin?'<span class="nav-badge">ADMIN</span>':""}
        <button class="btn btn-ghost btn-sm" id="btn-logout">Sign Out</button>
      </div>
    </div>
  </nav>
  <div class="content" id="main-content">
    ${S.tab==="leaderboard"?renderLeaderboard(lb):""}
    ${S.tab==="sessions"?renderSessions(lb):""}
    ${S.tab==="challenges"?renderChallenges():""}
    ${S.tab==="settings"?renderSettings():""}
  </div>
  <nav class="tabs">
    ${[["leaderboard","🏆","Board"],["sessions","📅","Sessions"],["challenges","⚡",tabLabel],["settings","⚙️","Settings"]]
      .map(([id,icon,label])=>`<button class="tab${S.tab===id?" active":""}" data-tab="${id}"><span class="tab-icon">${icon}</span><span>${label}</span></button>`).join("")}
  </nav>
  ${S.profilePlayer?renderProfileSheet(lb):""}
  `;
  document.getElementById("btn-logout").onclick = ()=>set({currentUser:null, tab:"leaderboard"});
  document.querySelectorAll(".tab[data-tab]").forEach(btn=>{
    btn.onclick=()=>set({tab:btn.dataset.tab,sessionView:null});
  });
  if(S.tab==="leaderboard") bindLeaderboard();
  if(S.tab==="sessions")    bindSessions();
  if(S.tab==="challenges")  bindChallenges();
  if(S.tab==="settings")    bindSettings();
  if(S.profilePlayer)       bindProfileSheet();
}

// =====================================================================
// CONFIG BANNER (shown before credentials entered)
// =====================================================================
function renderConfigBanner() {
  return `
  <div style="padding:20px;max-width:480px;margin:0 auto">
    <div style="font-family:var(--font-display);font-size:28px;color:var(--accent);margin-bottom:20px">🥒 PICKLEBALL</div>
    <div class="config-banner">
      <h2>⚙️ Setup Required</h2>
      <p>Open this HTML file in a text editor and replace the two placeholder values near the top of the &lt;script&gt; tag:</p>
      <p><code>SUPABASE_URL</code> — your project URL<br>
      <code>SUPABASE_ANON_KEY</code> — your anon/public key</p>
      <p>You'll find both in your Supabase dashboard under <strong>Project Settings → API</strong>.</p>
    </div>
    <div class="card">
      <div class="card-title">Quick Start</div>
      <ol style="font-size:13px;color:var(--text2);line-height:2;padding-left:18px">
        <li>Create a free account at <strong style="color:var(--text)">supabase.com</strong></li>
        <li>Create a new project</li>
        <li>Go to <strong style="color:var(--text)">SQL Editor</strong> and run the <code>supabase_setup.sql</code> file</li>
        <li>Go to <strong style="color:var(--text)">Project Settings → API</strong></li>
        <li>Copy <strong style="color:var(--text)">Project URL</strong> and <strong style="color:var(--text)">anon public key</strong></li>
        <li>Paste them into this HTML file and save</li>
        <li>Done — open the file in your browser!</li>
      </ol>
    </div>

        <button class="btn btn-sm ${att?"btn-success":"btn-ghost"} toggle-att" data-sid="${s.id}" data-pid="${p.id}"

    ${sMatches.length>0?`<button class="btn btn-primary" style="flex:1" id="btn-complete">✓ Complete</button>`:""}
  </div>`:""}
  ${sMatches.length>0?`
  <div class="mt-16">
    <div class="card-title">Matches</div>
    ${sMatches.map(m=>{
      const t1=[firstName(m.team1_p1),firstName(m.team1_p2)].join(" & ");
      const t2=[firstName(m.team2_p1),firstName(m.team2_p2)].join(" & ");
      let scoreHtml="";
      if(m.score1!==null){
        const wName=m.winner==="team1"?t1:m.winner==="team2"?t2:"Draw";
        scoreHtml=`<div class="match-score">${m.score1} — ${m.score2}</div>
          <div class="text-xs text-muted center mt-8">${m.winner!=="draw"?wName+" win":"Draw"}</div>`;
      } else if(S.currentUser.is_admin){
        scoreHtml=`<div class="flex gap-8 items-center mt-8" style="justify-content:center">
          <input class="input" style="width:60px;text-align:center" type="number" placeholder="0" id="s1_${m.id}">

        </div>`;
      } else {
        scoreHtml=`<div class="text-xs text-muted center mt-8">Score pending</div>`;
      }
      return `<div class="match-card">
        <div class="match-teams">
          <div class="match-team-left">${t1}</div><div class="match-vs">VS</div><div class="match-team-right">${t2}</div>
        </div>${scoreHtml}
        ${m.type==="challenge"?'<div class="mt-8"><span class="pill pill-orange">⚡ Challenge</span></div>':""}
      </div>`;

function bindSessions() {
  const showAdd=document.getElementById("btn-show-add");
  if(showAdd) showAdd.onclick=()=>document.getElementById("add-form").classList.toggle("hidden");
  const createBtn=document.getElementById("btn-create");
  if(createBtn) createBtn.onclick=async()=>{
    const dv=document.getElementById("new-date").value; if(!dv) return;
    createBtn.disabled=true;
    const d=new Date(dv+"T12:00:00");
    const label=`Session ${S.sessions.length+1} — ${d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
    await apiAddSession(dv, label);
  };
  document.querySelectorAll(".sess-open").forEach(el=>{
    el.onclick=()=>set({sessionView:el.dataset.sid});
  });
  document.querySelectorAll(".toggle-att").forEach(btn=>{
    btn.onclick=async e=>{
      e.stopPropagation(); btn.disabled=true;
      await apiToggleAttendance(btn.dataset.sid, btn.dataset.pid);
    };
  });
  const back=document.getElementById("btn-back");
  if(back) back.onclick=()=>set({sessionView:null});
  const gen=document.getElementById("btn-gen");
  if(gen) gen.onclick=async()=>{
    const s=S.sessions.find(x=>x.id===S.sessionView);
    const alertEl=document.getElementById("det-alert");
    if(s.attendees.length<4){ alertEl.innerHTML='<div class="alert alert-danger mt-8">Need at least 4 players.</div>'; return; }
    gen.disabled=true; gen.innerHTML='<span class="spinner"></span>';
    await apiGenerateMatches(s);
  };
  const comp=document.getElementById("btn-complete");
  if(comp) comp.onclick=async()=>{ comp.disabled=true; await apiCompleteSession(S.sessionView); };
  document.querySelectorAll(".save-score").forEach(btn=>{
    btn.onclick=async()=>{
      const s1=parseInt(document.getElementById("s1_"+btn.dataset.mid).value);
      const s2=parseInt(document.getElementById("s2_"+btn.dataset.mid).value);
      if(isNaN(s1)||isNaN(s2)) return;
      btn.disabled=true; await apiSaveScore(btn.dataset.mid,s1,s2);
    };
  });
}

function renderChallenges() {
  const sub=S.challengeSub;
  const myPending=S.challenges.filter(c=>c.status==="pending"&&c.responses[S.currentUser.id]==="pending"&&c.issuer_id!==S.currentUser.id);
  const lists={
    open:  S.challenges.filter(c=>c.status==="pending"||c.status==="scheduled"),
    mine:  S.challenges.filter(c=>[c.issuer_id,c.partner_id,c.opponent1_id,c.opponent2_id].includes(S.currentUser.id)),
    past:  S.challenges.filter(c=>c.status==="declined"),
  };
  const list=lists[sub]||[];
  const others=S.players.filter(p=>p.id!==S.currentUser.id);
  return `
  <div class="section-header">
    <h1 class="section-title">Challenges</h1>
    <button class="btn btn-primary btn-sm" id="btn-show-ch">+ Issue</button>
  </div>
  <div id="ch-alert"></div>
  ${myPending.length>0?`<div class="alert alert-info">You have ${myPending.length} pending challenge${myPending.length>1?"s":""} to respond to.</div>`:""}
  <div id="ch-form" class="hidden card">
    <div class="card-title">New Challenge</div>
    <div class="text-xs text-muted mb-12">You + a partner vs 2 opponents</div>
    <div class="field"><label class="label">Your Partner</label>
      <select class="input" id="ch-partner"><option value="">Select partner…</option>
        ${others.map(p=>`<option value="${p.id}">${p.name}</option>`).join("")}
      </select></div>
    <div class="field"><label class="label">Opponent 1</label>
      <select class="input" id="ch-opp1"><option value="">Select…</option>
        ${others.map(p=>`<option value="${p.id}">${p.name}</option>`).join("")}
      </select></div>
    <div class="field"><label class="label">Opponent 2</label>
      <select class="input" id="ch-opp2"><option value="">Select…</option>
        ${others.map(p=>`<option value="${p.id}">${p.name}</option>`).join("")}
      </select></div>
    <button class="btn btn-primary btn-sm" id="btn-issue">Issue Challenge</button>
  </div>
  <div class="toggle-wrap">
    ${[["open","Open"],["mine","Mine"],["past","Past"]].map(([v,l])=>`
      <button class="toggle-opt${sub===v?" active":""}" data-csub="${v}">${l}</button>`).join("")}
  </div>
  ${list.length===0?`<div class="empty"><div style="font-size:40px">⚡</div><div>No challenges here</div></div>`
    :list.map(c=>{
      const sc=c.status==="scheduled"?"pill-green":c.status==="declined"?"pill-red":"pill-amber";
      const sl=c.status==="scheduled"?"⚡ Scheduled":c.status==="declined"?"✗ Declined":"⏳ Pending";
      const iP=[c.partner_id,c.opponent1_id,c.opponent2_id].includes(S.currentUser.id);
      const iI=c.issuer_id===S.currentUser.id;
      const myR=c.responses[S.currentUser.id];
      const respStr=[c.partner_id,c.opponent1_id,c.opponent2_id].map(pid=>{
        const r=c.responses[pid]; return `${firstName(pid)}: ${r==="accepted"?"✓":r==="declined"?"✗":"?"}`;
      }).join(" · ");
      return `
      <div class="challenge-card">
        <div class="flex gap-8 items-center mb-8">
          <span class="pill ${sc}">${sl}</span>
          <span class="text-xs text-muted">${c.created_at}</span>
        </div>
        <div class="text-sm mb-8 bold">${firstName(c.issuer_id)} + ${firstName(c.partner_id)}
          <span class="text-muted"> vs </span>
          ${firstName(c.opponent1_id)} + ${firstName(c.opponent2_id)}
        </div>
        <div class="text-xs text-muted mb-8">${respStr}</div>
        ${iP&&!iI&&myR==="pending"&&c.status==="pending"?`
        <div class="flex gap-8">
          <button class="btn btn-success btn-sm ch-respond" data-cid="${c.id}" data-resp="accepted">Accept</button>
          <button class="btn btn-danger btn-sm ch-respond" data-cid="${c.id}" data-resp="declined">Decline</button>
        </div>`:""}
        ${iI?'<div class="text-xs text-muted">You issued this challenge</div>':""}
      </div>`;
    }).join("")}`;
}
function bindChallenges() {
  document.getElementById("btn-show-ch").onclick=()=>document.getElementById("ch-form").classList.toggle("hidden");
  const issueBtn=document.getElementById("btn-issue");
  if(issueBtn) issueBtn.onclick=async()=>{
    const p=document.getElementById("ch-partner").value;
    const o1=document.getElementById("ch-opp1").value;
    const o2=document.getElementById("ch-opp2").value;
    const alertEl=document.getElementById("ch-alert");
    if(!p||!o1||!o2){alertEl.innerHTML='<div class="alert alert-danger">Please select all players.</div>';return;}
    if(new Set([p,o1,o2]).size<3){alertEl.innerHTML='<div class="alert alert-danger">Players must be unique.</div>';return;}
    issueBtn.disabled=true; issueBtn.innerHTML='<span class="spinner"></span>';
    await apiIssueChallenge(p,o1,o2);
    alertEl.innerHTML='<div class="alert alert-success">Challenge issued!</div>';
    setTimeout(()=>alertEl.innerHTML="",3000);
  };
  document.querySelectorAll("[data-csub]").forEach(btn=>{
    btn.onclick=()=>set({challengeSub:btn.dataset.csub});
  });
  document.querySelectorAll(".ch-respond").forEach(btn=>{
    btn.onclick=async()=>{ btn.disabled=true; await apiRespondChallenge(btn.dataset.cid,btn.dataset.resp); };
  });
}

function renderProfileSheet(lb) {
  const p=getPlayer(S.profilePlayer); if(!p) return "";
  const stat=lb.find(s=>s.playerId===p.id)||{points:0,wins:0,losses:0,attended:0,gamesPlayed:0,beatHigher:0,beatSimilar:0,beatLower:0};
  const rank=lb.findIndex(s=>s.playerId===p.id)+1;
  const pMatches=S.matches.filter(m=>[m.team1_p1,m.team1_p2,m.team2_p1,m.team2_p2].includes(p.id));
  return `
  <div class="overlay" id="prof-overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="flex gap-12 items-center mb-16">
        <div class="avatar" style="width:52px;height:52px;font-size:18px">${initials(p.name)}</div>
        <div>
          <div style="font-family:var(--font-display);font-size:18px">${p.name}</div>
          <div class="text-sm text-muted">Rank #${rank} · ${stat.points} pts</div>
        </div>
      </div>
      <div class="stat-grid mb-16">
        <div class="stat-box"><div class="stat-val">${stat.wins}</div><div class="stat-lbl">Wins</div></div>
        <div class="stat-box"><div class="stat-val">${stat.losses}</div><div class="stat-lbl">Losses</div></div>
        <div class="stat-box"><div class="stat-val">${stat.attended}</div><div class="stat-lbl">Sessions</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--success)">${stat.beatHigher}</div><div class="stat-lbl">Upset wins</div></div>
        <div class="stat-box"><div class="stat-val">${stat.beatSimilar}</div><div class="stat-lbl">Even wins</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--text2)">${stat.beatLower}</div><div class="stat-lbl">Expected</div></div>
      </div>
      <div class="card-title">Match History</div>
      ${pMatches.length===0?'<div class="empty"><div>No matches yet</div></div>'
        :[...pMatches].reverse().map(m=>{
          const onT1=[m.team1_p1,m.team1_p2].includes(p.id);
          const myT=onT1?[m.team1_p1,m.team1_p2]:[m.team2_p1,m.team2_p2];
          const opT=onT1?[m.team2_p1,m.team2_p2]:[m.team1_p1,m.team1_p2];
          const mySc=onT1?m.score1:m.score2, opSc=onT1?m.score2:m.score1;
          const won=(onT1&&m.winner==="team1")||(!onT1&&m.winner==="team2");
          const pc=m.winner?(won?"pill-green":"pill-red"):"pill-blue";
          const res=m.winner?(won?"W":"L"):"—";
          return `
          <div class="history-row">
            <span class="pill ${pc}" style="min-width:32px;justify-content:center">${res}</span>
            <div style="flex:1">
              <div class="text-sm">${myT.map(firstName).join(" & ")} <span class="text-muted">vs</span> ${opT.map(firstName).join(" & ")}</div>
              <div class="text-xs text-muted">${m.date}${m.type==="challenge"?" · ⚡":""}</div>
            </div>
            ${m.score1!==null?`<span class="bold text-sm">${mySc} – ${opSc}</span>`:""}
          </div>`;
        }).join("")}
    </div>
  </div>`;
}
function bindProfileSheet() {
  const ov=document.getElementById("prof-overlay");
  if(ov) ov.onclick=e=>{ if(e.target===ov) set({profilePlayer:null}); };
}

async function boot() {
